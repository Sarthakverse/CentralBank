apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurekaserver
  labels:
    app: eurekaserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eurekaserver
  template:
    metadata:
      labels:
        app: eurekaserver
    spec:
      containers:
        - name: eurekaserver
          image: centralbank/eureka-microservice:s1
          imagePullPolicy: Never
          ports:
            - containerPort: 8072
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://configserver:8071/"
---
apiVersion: v1
kind: Service
metadata:
  name: eurekaserver
spec:
  selector:
    app: eurekaserver
  ports:
    - protocol: TCP
      port: 8072
      targetPort: 8072
  type: ClusterIP